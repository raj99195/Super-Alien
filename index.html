<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Super Alien — InitiaArcade</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #08070f;
      --border: rgba(123,47,255,0.18);
      --purple: #7B2FFF;
      --cyan:   #00d4ff;
      --green:  #00FF88;
      --muted:  #7755aa;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background: var(--bg);
      color:#fff;
      font-family: 'Rajdhani', sans-serif;
    }

    /* ── LOADING SCREEN ── */
    #loading-screen {
      position:fixed; inset:0; z-index:10;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background: var(--bg);
    }
    #loading-screen::before {
      content:""; position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(123,47,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123,47,255,0.04) 1px, transparent 1px);
      background-size:48px 48px; pointer-events:none;
    }
    .glow-orb {
      position:absolute; width:600px; height:600px;
      background:radial-gradient(circle, rgba(123,47,255,0.12) 0%, transparent 65%);
      border-radius:50%; pointer-events:none;
      animation:glowPulse 3.5s ease-in-out infinite;
    }
    @keyframes glowPulse { 0%,100%{opacity:0.7;transform:scale(1)} 50%{opacity:1;transform:scale(1.1)} }

    .loading-content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; }

    .big-logo {
      width:72px; height:72px;
      background:linear-gradient(135deg,var(--purple),var(--cyan));
      border-radius:18px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Orbitron',sans-serif; font-size:18px; font-weight:700; color:#fff;
      margin-bottom:28px;
      animation:float 3.5s ease-in-out infinite;
      box-shadow:0 0 32px rgba(123,47,255,0.5);
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

    .game-name {
      font-size:34px; font-weight:700; font-family:'Rajdhani',sans-serif;
      color:#fff; text-transform:uppercase; letter-spacing:-0.5px;
      margin-bottom:8px; text-align:center;
    }
    .game-chain {
      font-size:11px; color:var(--muted); margin-bottom:52px; text-align:center;
      text-transform:uppercase; letter-spacing:1.5px;
      font-family:'Rajdhani',sans-serif; font-weight:600;
    }
    .progress-wrap { width:320px; }
    .progress-track {
      height:3px; background:rgba(123,47,255,0.15);
      border-radius:2px; overflow:hidden; margin-bottom:10px;
    }
    .progress-fill {
      height:100%;
      background:linear-gradient(90deg,var(--purple),var(--cyan));
      border-radius:2px; width:0%; transition:width 0.25s ease;
      box-shadow:0 0 8px rgba(123,47,255,0.6);
    }
    .progress-meta { display:flex; justify-content:space-between; align-items:center; }
    .progress-status {
      font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px;
      font-family:'Rajdhani',sans-serif; font-weight:700;
    }
    .progress-pct {
      font-size:10px; color:var(--purple);
      font-family:'Orbitron',sans-serif; font-variant-numeric:tabular-nums;
    }
    .bottom-brand {
      position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
      display:flex; align-items:center; gap:10px;
      padding:8px 20px; border:1px solid var(--border); border-radius:20px;
      background:rgba(123,47,255,0.06); white-space:nowrap; backdrop-filter:blur(12px);
    }
    .brand-dot { width:3px; height:3px; background:var(--border); border-radius:50%; }
    .brand-text { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; font-family:'Rajdhani',sans-serif; font-weight:700; }
    .brand-accent { font-size:10px; color:var(--cyan); text-transform:uppercase; letter-spacing:0.8px; font-family:'Rajdhani',sans-serif; font-weight:700; }

    /* ── CANVAS — zResponsive style ── */
    #container { background:transparent !important; position:absolute; }
    #container canvas { position:absolute; background:#0a0818; }
    #container canvas[data-pixel-art="true"] {
      image-rendering:optimizeSpeed; image-rendering:-webkit-crisp-edges;
      image-rendering:-moz-crisp-edges; image-rendering:crisp-edges;
      image-rendering:pixelated; -ms-interpolation-mode:nearest-neighbor;
    }

    /* ── ERROR ── */
    #error-screen {
      display:none; position:fixed; inset:0;
      flex-direction:column; align-items:center; justify-content:center;
      gap:16px; background:var(--bg); z-index:20;
    }
    .error-title { font-size:18px; font-weight:700; color:#ff4444; font-family:'Rajdhani',sans-serif; }
    .error-msg { font-size:13px; color:var(--muted); max-width:400px; text-align:center; line-height:1.6; font-family:'Rajdhani',sans-serif; }
    .error-reload {
      padding:10px 28px; background:linear-gradient(135deg,var(--purple),#5a1fd4);
      border:none; border-radius:8px; color:#fff; font-size:13px; cursor:pointer;
      font-family:'Rajdhani',sans-serif; font-weight:700;
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="glow-orb"></div>
    <div class="loading-content">
      <div class="big-logo">IA</div>
      <div class="game-name">Super Alien</div>
      <div class="game-chain">on BotChain Blockchain</div>
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-meta">
          <span class="progress-status" id="progress-status">Initializing...</span>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>
      </div>
    </div>
    <div class="bottom-brand">
      <span class="brand-text">BotChain</span>
      <div class="brand-dot"></div>
      <span class="brand-text">Arcade X</span>
      <div class="brand-dot"></div>
      <span class="brand-accent">BotChain</span>
    </div>
  </div>

  <!-- Game Canvas -->
  <div id="container">
    <canvas id="game-canvas" data-pixel-art=""></canvas>
  </div>

  <!-- Error -->
  <div id="error-screen">
    <div style="font-size:48px">⚠️</div>
    <div class="error-title">Failed to load game</div>
    <div id="error-msg" class="error-msg"></div>
    <button class="error-reload" onclick="location.reload()">↺ Reload</button>
  </div>

  <script src="arcade-sdk.js"></script>
  <script src="Build/Super Alien.loader.js"></script>
  <script>
    var canvas   = document.querySelector("#game-canvas");
    var fillEl   = document.querySelector("#progress-fill");
    var pctEl    = document.querySelector("#progress-pct");
    var statusEl = document.querySelector("#progress-status");

    var config = {
      dataUrl:            "Build/Super Alien.data",
      frameworkUrl:       "Build/Super Alien.framework.js",
      codeUrl:            "Build/Super Alien.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName:        "Get Unity Code",
      productName:        "Super Alien",
      productVersion:     "0.1",
    };

    var scaleToFit;
    try { scaleToFit = !!JSON.parse(""); }
    catch(e) { scaleToFit = true; }

    var statusMsgs = [
      [0,   "Initializing..."],
      [0.2, "Loading assets..."],
      [0.5, "Compiling shaders..."],
      [0.8, "Connecting to chain..."],
      [1.0, "Ready!"]
    ];

    function progressHandler(progress) {
      var pct = Math.round(progress * 100);
      fillEl.style.width   = pct + "%";
      pctEl.textContent    = pct + "%";
      for (var i = statusMsgs.length - 1; i >= 0; i--) {
        if (progress >= statusMsgs[i][0]) { statusEl.textContent = statusMsgs[i][1]; break; }
      }
    }

    // zResponsive onResize — exact logic
    function onResize() {
      var container = canvas.parentElement;
      var w, h;
      if (scaleToFit) {
        w = window.innerWidth;
        h = window.innerHeight;
        var r = 1080 / 1920;
        if (w * r > window.innerHeight) { w = Math.min(w, Math.ceil(h / r)); }
        h = Math.floor(w * r);
      } else {
        w = 1920;
        h = 1080;
      }
      container.style.width  = canvas.style.width  = w + "px";
      container.style.height = canvas.style.height = h + "px";
      container.style.top    = Math.floor((window.innerHeight - h) / 2) + "px";
      container.style.left   = Math.floor((window.innerWidth  - w) / 2) + "px";
    }

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.head.appendChild(meta);
    }

    window.addEventListener('resize', onResize);
    onResize();

    createUnityInstance(canvas, config, progressHandler)
      .then(function(instance) {
        window.gameInstance = instance;
        canvas = instance.Module.canvas;
        onResize();
        document.querySelector("#loading-screen").style.display = "none";
      })
      .catch(function(msg) {
        document.querySelector("#loading-screen").style.display = "none";
        document.querySelector("#error-msg").textContent = msg;
        document.querySelector("#error-screen").style.display = "flex";
      });
  </script>
</body>
</html>
